server:
  port: 8080 # 服务端口号
  servlet:
    context-path: /api # 添加全局接口前缀

spring:
  ai:
    deepseek:
      apiKey:  # 你的api key
      apiUrl: https://api.deepseek.com/chat/completions
      model: deepseek-chat # 选择模型（V3：deepseek-chat  R1：deepseek-reasoner）
      temperature: 0.7
      maxTokens: 1000
  # 数据库配置信息
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.31.222:3306/copy_animal?serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true
    username: root
    password: 123456
    # 连接池
    hikari:
      minimum-idle: 5 # 最小空闲连接数
      maximum-pool-size: 10 # 最大活跃连接数
      connection-timeout: 30000 # 连接超时时间（毫秒）
      idle-timeout: 600000 # 空闲连接最大存活时间
      auto-commit: true # 此属性控制从池返回的连接的默认自动提交行为
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 20MB # 单个文件大小限制
      max-request-size: 20MB # 总请求大小限制
  # 配置swagger
  mvc:
    path match:
      matching-strategy: ant_path_matcher

# mybatis-plus配置
mybatis-plus:
  configuration:
    mapUnderscoreToCamelCase: true # 是否开启自动驼峰命名规则，默认为true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 打印sql日志
#  global-config:
#    db-config:
#      logic-delete-field: isDelete # 全局逻辑删除的实体字段名(since 3.3.0,配置后可以忽略不配置步骤2)
#      logic-delete-value: 1 # 逻辑已删除值(默认为 1)
#      logic-not-delete-value: 0 # 逻辑未删除值(默认为 0)

############## Sa-Token 配置 (文档: https://sa-token.cc) ##############
sa-token:
  # token 名称（同时也是 cookie 名称）
  token-name: Authorization
  # token 有效期（单位：秒） 默认30天，-1 代表永久有效
  timeout: 86400
  # token 最低活跃频率（单位：秒），如果 token 超过此时间没有访问系统就会被冻结，默认-1 代表不限制，永不冻结
  active-timeout: 86400
  # 是否允许同一账号多地同时登录 （为 true 时允许一起登录, 为 false 时新登录挤掉旧登录）
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 token （为 true 时所有登录共用一个 token, 为 false 时每次登录新建一个 token）
  is-share: false
  # token 风格（默认可取值：uuid、simple-uuid、random-32、random-64、random-128、tik）
  # token-style: uuid
  # jwt秘钥
  jwt-secret-key: advasudgqhkdknsakisd
  # 是否输出操作日志
  is-log: true
  //前端用户操作，然后数据传送到后端，由controller层接受，然后对他进行处理，调用service中声明的方法，（所有的方法都需要在service中声明）
  这些方法只是在service声明，具体的是现在service中的serviceimpl方法实现类，记录方法具体实现操作原理。
  从impl中返回数据给controller，然后再返回前端展示。