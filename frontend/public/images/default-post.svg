<svg width="300" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="postGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F57C00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="300" height="200" fill="#FFF3E0"/>
  
  <!-- 文档图标 -->
  <rect x="100" y="50" width="100" height="120" rx="5" fill="white" stroke="#E0E0E0" stroke-width="2"/>
  
  <!-- 文档内容线条 -->
  <line x1="110" y1="70" x2="180" y2="70" stroke="#FF9800" stroke-width="3"/>
  <line x1="110" y1="85" x2="190" y2="85" stroke="#E0E0E0" stroke-width="2"/>
  <line x1="110" y1="100" x2="170" y2="100" stroke="#E0E0E0" stroke-width="2"/>
  <line x1="110" y1="115" x2="185" y2="115" stroke="#E0E0E0" stroke-width="2"/>
  <line x1="110" y1="130" x2="160" y2="130" stroke="#E0E0E0" stroke-width="2"/>
  
  <!-- 聊天气泡 -->
  <ellipse cx="220" cy="90" rx="25" ry="20" fill="url(#postGradient)"/>
  <polygon points="195,95 205,90 205,100" fill="url(#postGradient)"/>
  
  <!-- 气泡内容 -->
  <circle cx="215" cy="85" r="2" fill="white"/>
  <circle cx="220" cy="85" r="2" fill="white"/>
  <circle cx="225" cy="85" r="2" fill="white"/>
  
  <!-- 文字 -->
  <text x="150" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#666">
    论坛帖子
  </text>
</svg>